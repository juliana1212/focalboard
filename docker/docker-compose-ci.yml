version: "3.8"

services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: focalboard-jenkins:local
    container_name: focalboard-jenkins
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - ci

  sonarqube-db:
    image: postgres:15-alpine
    container_name: focalboard-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    networks:
      - ci

  sonarqube:
    image: sonarqube:lts-community
    container_name: focalboard-sonarqube
    depends_on:
      - sonarqube-db
    restart: unless-stopped
    ports:
      - "9001:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - ci

volumes:
  jenkins_home:
  sonarqube_db:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  ci:
